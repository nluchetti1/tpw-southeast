name: Update Weather Dashboard
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Geo-Libs
        run: |
          sudo apt-get update
          # Use libeccodes-dev and libeccodes-tools for Noble compatibility
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libhdf5-dev libeccodes-dev libeccodes-tools

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install herbie cfgrib satpy pyresample xarray netCDF4 metpy cartopy siphon matplotlib scipy requests

      - name: Verify Environment
        run: |
          python -c "from herbie import Herbie; print('Herbie Loaded')"
          python -c "import cfgrib; print('GRIB engine Loaded')"

      - name: Generate Plot
        run: python generate_map.py

      - name: Commit Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output_map.png
          git commit -m "Auto-Update: $(date)" || exit 0
          git push
