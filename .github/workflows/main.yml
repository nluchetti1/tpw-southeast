name: Update Weather Dashboard
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Geo-Libs
        run: |
          sudo apt-get update
          # Essential for reading RAP GRIB2 and plotting counties
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libhdf5-dev libeccodes-dev libeccodes-tools

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # THIS IS THE CRITICAL MISSING STEP
          pip install -r requirements.txt
          # Force install these two just in case
          pip install herbie cfgrib

      - name: Verify Environment
        run: |
          python -c "from herbie import Herbie; print('SUCCESS: Herbie is ready')"
          python -c "import cfgrib; print('SUCCESS: GRIB engine is ready')"

      - name: Generate Plot
        run: python generate_map.py

      - name: Commit Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output_map.png
          git commit -m "Auto-Update: $(date)" || exit 0
          git push
