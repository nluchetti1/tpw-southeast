name: Update Weather Dashboard
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # We are removing the cache temporarily to force a clean environment
          
      - name: Install System Geo-Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libhdf5-dev libeccodes-dev libeccodes-tools

      - name: Force Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # We use -m pip install to ensure it links to the current python executable
          python -m pip install herbie cfgrib satpy pyresample xarray netCDF4 metpy cartopy siphon matplotlib scipy requests

      - name: Verify Environment
        run: |
          # If these fail, the log will show exactly where it looked
          python -m pip show herbie
          python -c "import herbie; print('SUCCESS: Herbie found at', herbie.__file__)"
          python -c "import cfgrib; print('SUCCESS: GRIB engine found')"

      - name: Generate Plot
        run: python generate_map.py

      - name: Commit Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output_map.png
          git commit -m "Auto-Update: $(date)" || exit 0
          git push
