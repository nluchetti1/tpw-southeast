name: Update Weather Data
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: sudo apt-get install libgeos-dev libproj-dev proj-data proj-bin

      - name: Install Python Libs
        run: pip install xarray netCDF4 metpy cartopy siphon matplotlib scipy

      - name: Run Processing
        run: python generate_map.py

      - name: Push to Repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output_map.png
          git commit -m "Real-time Update: $(date)" || exit 0
          git push
