name: Update Weather Dashboard
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up subsequent runs by caching dependencies

      - name: Install System Geo-Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libhdf5-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install satpy pyresample xarray netCDF4 metpy cartopy siphon matplotlib scipy requests

      - name: Verify Installation
        run: |
          python -c "import satpy; print('Satpy version:', satpy.__version__)"
          python -c "import metpy; print('Metpy version:', metpy.__version__)"

      - name: Generate Plot
        run: python generate_map.py

      - name: Commit Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output_map.png
          git commit -m "Auto-Update: $(date)" || exit 0
          git push
