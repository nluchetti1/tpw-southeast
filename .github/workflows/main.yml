name: Update Weather Dashboard
on:
  schedule:
    - cron: '*/15 * * * *' # Runs every 15 minutes
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write         # Fixes the 403 Permission Denied error

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install System Geo-Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libhdf5-dev eccodes

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Added herbie, cfgrib (GRIB2 driver), and satpy dependencies
          pip install herbie cfgrib satpy pyresample xarray netCDF4 metpy cartopy siphon matplotlib scipy requests

      - name: Verify Herbie Installation
        run: |
          python -c "from herbie import Herbie; print('Herbie is ready')"

      - name: Generate Plot
        run: python generate_map.py

      - name: Commit Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output_map.png
          git commit -m "Auto-Update: $(date)" || exit 0
          git push
