name: Update Weather Dashboard
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Geo-Libs
        run: |
          sudo apt-get update
          sudo apt-get install -y libgeos-dev libproj-dev proj-data proj-bin libhdf5-dev libeccodes-dev libeccodes-tools

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # Explicitly installing imageio alongside herbie-data
          python -m pip install --no-cache-dir herbie-data cfgrib satpy pyresample xarray netCDF4 metpy cartopy siphon matplotlib scipy requests imageio

      - name: Verify Animation Engine
        run: |
          python -c "import imageio; print('SUCCESS: ImageIO ready for animation')"

      - name: Generate Plot
        run: python generate_map.py

      - name: Commit Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Ensure both the static map and the animation are added
          git add output_map.png output_animation.gif
          git commit -m "Auto-Update Animation: $(date)" || exit 0
          git push
